<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 账号余额监控大屏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>API 账号余额监控大屏</h1>
        <div class="controls">
            <div class="control-item">
                <label>刷新间隔:</label>
                <select id="intervalSelect">
                    <option value="30">30秒</option>
                    <option value="60" selected>1分钟</option>
                    <option value="300">5分钟</option>
                    <option value="600">10分钟</option>
                    <option value="0">手动刷新</option>
                </select>
            </div>
            <div class="control-item">
                <button class="primary" onclick="refreshData()">立即刷新</button>
            </div>
            <div class="control-item">
                <span id="statusText" class="status">就绪</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>总账号数</h3>
                <div class="value" id="totalAccounts">0</div>
            </div>
            <div class="stat-card">
                <h3>总余额</h3>
                <div class="value">$<span id="totalBalance">0.00</span></div>
            </div>
            <div class="stat-card">
                <h3>总已用</h3>
                <div class="value">$<span id="totalUsed">0.00</span></div>
            </div>
            <div class="stat-card">
                <h3>平均余额</h3>
                <div class="value">$<span id="avgBalance">0.00</span></div>
            </div>
        </div>

        <div class="cards-container" id="cardsContainer">
            <!-- 账号卡片将动态加载 -->
        </div>

        <div class="last-update">
            最后更新: <span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        let refreshInterval = null;
        let isLoading = false;
        let accountsConfig = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            setupAutoRefresh();
        });

        // 加载配置（账号列表）
        async function loadConfig() {
            try {
                const response = await fetch('api.php?action=get_config');
                const result = await response.json();

                if (result.success) {
                    accountsConfig = result.data;
                    renderEmptyCards(); // 先渲染空卡片
                    refreshData(); // 然后加载余额
                } else {
                    updateStatus('加载配置失败: ' + result.message, false);
                }
            } catch (error) {
                console.error('加载配置失败:', error);
                updateStatus('加载配置失败: ' + error.message, false);
            }
        }

        // 渲染空卡片（余额显示加载中）
        function renderEmptyCards() {
            if (!accountsConfig) return;

            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            accountsConfig.sites.forEach(site => {
                site.accounts.forEach(account => {
                    const card = document.createElement('div');
                    card.className = 'account-card';
                    card.id = `card-${account.siteIndex}-${account.accountIndex}`;

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="site-name">${site.name}</div>
                            <div class="account-name">${account.name}</div>
                        </div>
                        <div class="card-body">
                            <div class="balance-info loading-pulse">
                                正在加载余额...
                            </div>
                        </div>
                    `;

                    container.appendChild(card);
                });
            });

            // 更新账号数量
            const totalAccounts = accountsConfig.sites.reduce((sum, site) => sum + site.accounts.length, 0);
            document.getElementById('totalAccounts').textContent = totalAccounts;
        }

        // 设置自动刷新
        function setupAutoRefresh() {
            const select = document.getElementById('intervalSelect');
            select.addEventListener('change', function() {
                clearInterval(refreshInterval);
                const seconds = parseInt(this.value);
                if (seconds > 0) {
                    refreshInterval = setInterval(refreshData, seconds * 1000);
                }
            });

            // 默认启动自动刷新
            const defaultInterval = parseInt(select.value);
            if (defaultInterval > 0) {
                refreshInterval = setInterval(refreshData, defaultInterval * 1000);
            }
        }

        // 刷新数据（只更新余额）
        async function refreshData() {
            if (isLoading || !accountsConfig) return;
            isLoading = true;

            updateStatus('正在更新余额...', true);

            try {
                // 并发请求所有账号余额
                const promises = [];

                accountsConfig.sites.forEach(site => {
                    site.accounts.forEach(account => {
                        const promise = fetch(`api.php?action=query_balance&site=${account.siteIndex}&account=${account.accountIndex}`)
                            .then(response => response.json())
                            .then(result => {
                                updateCard(account.siteIndex, account.accountIndex, site.name, account.name, result);
                            })
                            .catch(error => {
                                console.error(`查询失败 [${site.name}/${account.name}]:`, error);
                                updateCard(account.siteIndex, account.accountIndex, site.name, account.name, {
                                    success: false,
                                    message: error.message
                                });
                            });

                        promises.push(promise);
                    });
                });

                await Promise.all(promises);

                updateStats();
                updateLastUpdate();
                updateStatus('更新成功');
            } catch (error) {
                console.error('刷新失败:', error);
                updateStatus('刷新失败: ' + error.message, false);
            } finally {
                isLoading = false;
            }
        }

        // 更新单个卡片
        function updateCard(siteIndex, accountIndex, siteName, accountName, result) {
            const card = document.getElementById(`card-${siteIndex}-${accountIndex}`);
            if (!card) return;

            if (result.success) {
                const data = result.data;
                const percentage = (data.remaining / data.total) * 100;
                const progressClass = percentage > 50 ? '' : percentage > 20 ? 'warning' : 'danger';

                card.innerHTML = `
                    <div class="card-header">
                        <div class="site-name">${siteName}</div>
                        <div class="account-name">${accountName}</div>
                    </div>
                    <div class="card-body">
                        <div class="balance-info">
                            <div class="balance-row">
                                <span class="label">套餐</span>
                                <span class="value">${data.planName}</span>
                            </div>
                            <div class="balance-row">
                                <span class="label">剩余额度</span>
                                <span class="value">$${data.remaining.toFixed(2)}</span>
                            </div>
                            <div class="balance-row">
                                <span class="label">已用额度</span>
                                <span class="value">$${data.used.toFixed(2)}</span>
                            </div>
                            <div class="balance-row">
                                <span class="label">总额度</span>
                                <span class="value">$${data.total.toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>剩余 ${percentage.toFixed(1)}%</span>
                                <span>已用 ${(100 - percentage).toFixed(1)}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${progressClass}" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                    </div>
                `;

                // 保存数据用于统计
                card.dataset.balance = data.remaining;
                card.dataset.used = data.used;
            } else {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="site-name">${siteName}</div>
                        <div class="account-name">${accountName}</div>
                    </div>
                    <div class="card-body">
                        <div class="error-message">
                            查询失败: ${result.message}
                        </div>
                    </div>
                `;
            }
        }

        // 更新统计数据
        function updateStats() {
            const cards = document.querySelectorAll('.account-card');
            let totalBalance = 0;
            let totalUsed = 0;
            let successCount = 0;

            cards.forEach(card => {
                if (card.dataset.balance) {
                    totalBalance += parseFloat(card.dataset.balance);
                    totalUsed += parseFloat(card.dataset.used);
                    successCount++;
                }
            });

            document.getElementById('totalBalance').textContent = totalBalance.toFixed(2);
            document.getElementById('totalUsed').textContent = totalUsed.toFixed(2);
            document.getElementById('avgBalance').textContent = successCount > 0
                ? (totalBalance / successCount).toFixed(2)
                : '0.00';
        }

        // 更新状态文本
        function updateStatus(text, loading = false) {
            const status = document.getElementById('statusText');
            status.textContent = text;
            status.className = 'status' + (loading ? ' loading' : '');
        }

        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = timeStr;
        }
    </script>
</body>
</html>
