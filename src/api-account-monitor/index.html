<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 账号余额监控大屏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>API 账号余额监控大屏</h1>
        <div class="controls">
            <div class="control-item">
                <label>刷新间隔:</label>
                <select id="intervalSelect">
                    <option value="30">30秒</option>
                    <option value="60" selected>1分钟</option>
                    <option value="300">5分钟</option>
                    <option value="600">10分钟</option>
                    <option value="0">手动刷新</option>
                </select>
            </div>
            <div class="control-item">
                <button class="primary" onclick="refreshData()">立即刷新</button>
            </div>
            <div class="control-item">
                <span id="statusText" class="status">就绪</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>总账号数</h3>
                <div class="value" id="totalAccounts">0</div>
            </div>
            <div class="stat-card">
                <h3>总余额</h3>
                <div class="value">¥<span id="totalBalance">0.00</span></div>
            </div>
            <div class="stat-card">
                <h3>总已用</h3>
                <div class="value">¥<span id="totalUsed">0.00</span></div>
            </div>
            <div class="stat-card">
                <h3>平均余额</h3>
                <div class="value">¥<span id="avgBalance">0.00</span></div>
            </div>
        </div>

        <div class="cards-container" id="cardsContainer"></div>

        <div class="last-update">
            最后更新: <span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        let refreshInterval = null;
        let isLoading = false;
        let accountsConfig = null;
        let accountsData = {};

        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
        });

        async function loadConfig() {
            try {
                const response = await fetch('api.php?action=get_config');
                const result = await response.json();

                if (result.success) {
                    accountsConfig = result.data;
                    if (accountsConfig.refreshInterval !== undefined) {
                        const select = document.getElementById('intervalSelect');
                        const option = select.querySelector(`option[value="¥{accountsConfig.refreshInterval}"]`);
                        if (option) {
                            select.value = accountsConfig.refreshInterval;
                        } else {
                            const customOption = document.createElement('option');
                            customOption.value = accountsConfig.refreshInterval;
                            const mins = Math.floor(accountsConfig.refreshInterval / 60);
                            const secs = accountsConfig.refreshInterval % 60;
                            customOption.textContent = mins > 0
                                ? (secs > 0 ? `¥{mins}分¥{secs}秒` : `¥{mins}分钟`)
                                : `¥{secs}秒`;
                            customOption.selected = true;
                            select.insertBefore(customOption, select.firstChild);
                        }
                    }
                    renderEmptyCards();
                    setupAutoRefresh();
                    refreshData();
                } else {
                    updateStatus('加载配置失败: ' + result.message, false);
                }
            } catch (error) {
                console.error('加载配置失败:', error);
                updateStatus('加载配置失败: ' + error.message, false);
            }
        }

        function renderEmptyCards() {
            if (!accountsConfig) return;
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            accountsConfig.sites.forEach((site, si) => {
                site.accounts.forEach((account, ai) => {
                    const card = document.createElement('div');
                    card.className = 'account-card';
                    card.id = `card-¥{si}-¥{ai}`;
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="header-left">
                                <div class="site-name">¥{site.name}</div>
                                <div class="account-info">
                                    <span class="account-name">¥{account.name}</span>
                                    ¥{account.account ? '<span class="account-login">' + account.account + '</span>' : ''}
                                </div>
                            </div>
                            <button class="refresh-btn" onclick="refreshSingleCard(¥{si},¥{ai})" title="刷新此账号">↻</button>
                        </div>
                        <div class="card-body">
                            <div class="balance-display loading-pulse">加载中...</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });

            const totalAccounts = accountsConfig.sites.reduce((sum, site) => sum + site.accounts.length, 0);
            document.getElementById('totalAccounts').textContent = totalAccounts;
        }

        function setupAutoRefresh() {
            const select = document.getElementById('intervalSelect');
            select.addEventListener('change', function() {
                clearInterval(refreshInterval);
                const seconds = parseInt(this.value);
                if (seconds > 0) {
                    refreshInterval = setInterval(refreshData, seconds * 1000);
                }
            });

            if (accountsConfig && accountsConfig.refreshInterval !== undefined) {
                const seconds = accountsConfig.refreshInterval;
                if (seconds > 0) {
                    refreshInterval = setInterval(refreshData, seconds * 1000);
                }
            } else {
                const defaultInterval = parseInt(select.value);
                if (defaultInterval > 0) {
                    refreshInterval = setInterval(refreshData, defaultInterval * 1000);
                }
            }
        }

        function getReferenceMax() {
            let maxBalance = 0;
            for (const key in accountsData) {
                const d = accountsData[key];
                if (d && d.success) {
                    maxBalance = Math.max(maxBalance, d.data.remaining);
                }
            }
            return maxBalance >= 100 ? maxBalance : 100;
        }

        function renderAllCards() {
            const refMax = getReferenceMax();

            for (const key in accountsData) {
                const d = accountsData[key];
                const [si, ai] = key.split('-').map(Number);
                const card = document.getElementById(`card-¥{si}-¥{ai}`);
                if (!card) continue;

                if (d.success) {
                    const data = d.data;
                    const pct = (data.remaining / refMax) * 100;
                    const colorClass = data.remaining > refMax * 0.5 ? '' : data.remaining > refMax * 0.2 ? 'warning' : 'danger';

                    card.querySelector('.card-body').innerHTML = `
                        <div class="balance-display">
                            <span class="balance-amount">¥¥{data.remaining.toFixed(2)}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill ¥{colorClass}" style="width: ¥{Math.min(pct, 100)}%"></div>
                            </div>
                            <span class="progress-pct">¥{pct.toFixed(1)}%</span>
                        </div>
                    `;
                    card.dataset.balance = data.remaining;
                    card.dataset.used = data.used;
                } else {
                    card.querySelector('.card-body').innerHTML = `
                        <div class="error-message">¥{d.message || '查询失败'}</div>
                    `;
                    delete card.dataset.balance;
                    delete card.dataset.used;
                }
            }
        }

        async function refreshData() {
            if (isLoading || !accountsConfig) return;
            isLoading = true;
            updateStatus('正在更新...', true);
            document.querySelectorAll('.refresh-btn').forEach(btn => btn.disabled = true);

            try {
                const promises = [];
                accountsConfig.sites.forEach((site, si) => {
                    site.accounts.forEach((account, ai) => {
                        const promise = fetch(`api.php?action=query_balance&site=¥{si}&account=¥{ai}`)
                            .then(r => r.json())
                            .then(result => {
                                accountsData[`¥{si}-¥{ai}`] = result;
                            })
                            .catch(error => {
                                console.error(`查询失败 [¥{site.name}/¥{account.name}]:`, error);
                                accountsData[`¥{si}-¥{ai}`] = { success: false, message: error.message };
                            });
                        promises.push(promise);
                    });
                });

                await Promise.all(promises);
                renderAllCards();
                updateStats();
                updateLastUpdate();
                updateStatus('更新成功');
            } catch (error) {
                console.error('刷新失败:', error);
                updateStatus('刷新失败: ' + error.message, false);
            } finally {
                isLoading = false;
                document.querySelectorAll('.refresh-btn').forEach(btn => btn.disabled = false);
            }
        }

        async function refreshSingleCard(si, ai) {
            const card = document.getElementById(`card-¥{si}-¥{ai}`);
            const btn = card ? card.querySelector('.refresh-btn') : null;
            if (btn && btn.classList.contains('spinning')) return;
            if (btn) btn.classList.add('spinning');

            try {
                const response = await fetch(`api.php?action=query_balance&site=¥{si}&account=¥{ai}`);
                const result = await response.json();
                accountsData[`¥{si}-¥{ai}`] = result;
            } catch (error) {
                console.error('查询失败:', error);
                accountsData[`¥{si}-¥{ai}`] = { success: false, message: error.message };
            }

            renderAllCards();
            updateStats();
            updateLastUpdate();
            if (btn) btn.classList.remove('spinning');
        }

        function updateStats() {
            let totalBalance = 0, totalUsed = 0, successCount = 0;
            document.querySelectorAll('.account-card').forEach(card => {
                if (card.dataset.balance) {
                    totalBalance += parseFloat(card.dataset.balance);
                    totalUsed += parseFloat(card.dataset.used);
                    successCount++;
                }
            });
            document.getElementById('totalBalance').textContent = totalBalance.toFixed(2);
            document.getElementById('totalUsed').textContent = totalUsed.toFixed(2);
            document.getElementById('avgBalance').textContent = successCount > 0
                ? (totalBalance / successCount).toFixed(2) : '0.00';
        }

        function updateStatus(text, loading = false) {
            const status = document.getElementById('statusText');
            status.textContent = text;
            status.className = 'status' + (loading ? ' loading' : '');
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
    </script>
</body>
</html>
